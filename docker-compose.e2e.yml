# Fully containerised e2e stack — works from any git worktree.
# Uses project name "langteachsaas-e2e" so it never conflicts with the dev stack.
#
# Usage (run e2e tests):
#   cp .env.e2e.example .env.e2e   # fill in secrets once
#   docker compose -f docker-compose.e2e.yml --env-file .env.e2e --profile test up --build --exit-code-from playwright
#
# Usage (UI review mode, no playwright container):
#   docker compose -f docker-compose.e2e.yml --env-file .env.e2e up -d --build
#   # Frontend available at http://localhost:5174 for host-side Playwright

name: langteachsaas-e2e
#
# Exit code mirrors playwright: 0 = all tests pass, non-zero = failures.
# Reports and screenshots are written to e2e/playwright-report/ and e2e/test-results/.
#
# To wipe state between runs (fresh DB):
#   docker compose -f docker-compose.e2e.yml --env-file .env.e2e down -v
#
# Note: ASPNETCORE_ENVIRONMENT=E2ETesting bypasses JWT validation so mock-auth
# tests can call the API with a synthetic token. Auth0-dependent tests
# (registration, auth-me, auth-diagnostic) are skipped via CI=true on the
# playwright service — they require a real Auth0 browser session and run only
# when triggered locally or in the nightly CI workflow with injected credentials.

services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    command: "azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --skipApiVersionCheck"
    volumes:
      - e2e-azurite-data:/data

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - e2e-sqlserver-data:/var/opt/mssql

  api:
    build:
      context: ./backend
      dockerfile: LangTeach.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: E2ETesting
      ConnectionStrings__Default: "Server=sqlserver,1433;Database=LangTeach;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=true"
      Auth0__Domain: "${AUTH0_DOMAIN}"
      Auth0__Audience: "${AUTH0_AUDIENCE}"
      Claude__ApiKey: "${CLAUDE_API_KEY}"
      AllowedOrigins__E2e: "http://frontend:5174"
      AzureBlobStorage__ConnectionString: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;"
    healthcheck:
      test: curl -sf http://localhost:5000/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      sqlserver:
        condition: service_healthy
      azurite:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: e2e
    environment:
      # VITE_* process env vars override values baked into frontend/.env.e2e
      VITE_E2E_TEST_MODE: "true"
      VITE_API_URL: "http://api:5000"
      VITE_API_PROXY_TARGET: "http://api:5000"
      VITE_AUTH0_DOMAIN: "${AUTH0_DOMAIN}"
      VITE_AUTH0_CLIENT_ID: "${VITE_AUTH0_CLIENT_ID}"
      VITE_AUTH0_AUDIENCE: "${AUTH0_AUDIENCE}"
    ports:
      - "5174:5174"
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:5174"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    depends_on:
      api:
        condition: service_healthy

  playwright:
    profiles: ["test"]
    build:
      context: ./e2e
      dockerfile: Dockerfile
    environment:
      PLAYWRIGHT_BASE_URL: "http://frontend:5174"
      VITE_API_BASE_URL: "http://api:5000"
      CI: "true"
      E2E_TEST_EMAIL: "${E2E_TEST_EMAIL}"
      E2E_TEST_PASSWORD: "${E2E_TEST_PASSWORD}"
      E2E_TEST_AUTH0_USER_ID: "${E2E_TEST_AUTH0_USER_ID}"
      # Direct SQL access for test helpers (db-helper.ts)
      DB_SERVER: "sqlserver"
      DB_PORT: "1433"
      DB_NAME: "LangTeach"
      DB_USER: "sa"
      DB_PASSWORD: "${SA_PASSWORD}"
    depends_on:
      frontend:
        condition: service_healthy
    volumes:
      - ./e2e/test-results:/e2e/test-results
      - ./e2e/playwright-report:/e2e/playwright-report

volumes:
  e2e-sqlserver-data:
  e2e-azurite-data:
