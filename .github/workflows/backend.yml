name: Backend CI/CD

on:
  push:
    branches: [main, 'sprint/*']
    paths: ['backend/**', '.github/workflows/backend.yml']
  pull_request:
    paths: ['backend/**', '.github/workflows/backend.yml']

permissions:
  contents: read

env:
  IMAGE_NAME: langteach-api
  ACR_NAME: crlangteachdev
  ACR_LOGIN_SERVER: crlangteachdev.azurecr.io
  CONTAINER_APP_NAME: app-langteach-api-dev
  RESOURCE_GROUP: rg-langteach-dev

jobs:
  ci:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Restore
        run: dotnet restore
        working-directory: backend

      - name: Build
        run: dotnet build --no-restore -c Release
        working-directory: backend

      - name: Test
        run: dotnet test --no-build -c Release
        working-directory: backend

  validate-secrets:
    name: Validate Key Vault secrets
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_FROZEN != 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate required Key Vault secrets
        run: |
          SUBSCRIPTION_ID=$(az account show --query id -o tsv)
          KV_NAME=$(az keyvault list \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "[?starts_with(name, 'kv-lt-')].name | [0]" -o tsv)

          if [ -z "$KV_NAME" ]; then
            echo "ERROR: No Key Vault found in resource group ${{ env.RESOURCE_GROUP }}"
            exit 1
          fi

          echo "Checking secrets in Key Vault: ${KV_NAME}"

          SECRETS=$(jq -r '.requiredSecrets[]' infra/required-secrets.json)
          MISSING=()

          for SECRET in $SECRETS; do
            if ERROR_OUTPUT=$(az rest \
              --method GET \
              --url "https://management.azure.com/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.KeyVault/vaults/${KV_NAME}/secrets/${SECRET}?api-version=2023-07-01" \
              --output none 2>&1); then
              : # secret exists
            else
              ERROR_CODE=$(echo "$ERROR_OUTPUT" | grep -o '"code":"[^"]*"' | head -1 | sed 's/"code":"//;s/"//')
              if [ "$ERROR_CODE" = "ResourceNotFound" ]; then
                MISSING+=("$SECRET")
              else
                echo "ERROR: Unexpected failure checking secret '${SECRET}':"
                echo "  ${ERROR_OUTPUT}"
                echo "  This may indicate a permissions issue or transient Azure error (code: ${ERROR_CODE:-unknown})."
                echo "  Verify the CI service principal has Contributor role on resource group ${{ env.RESOURCE_GROUP }}."
                exit 1
              fi
            fi
          done

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "ERROR: The following required secrets are missing from Key Vault '${KV_NAME}':"
            for S in "${MISSING[@]}"; do
              echo "  - ${S}"
            done
            echo ""
            echo "Provision each missing secret before deploying:"
            echo "  az keyvault secret set --vault-name ${KV_NAME} --name <secret-name> --value <value>"
            exit 1
          fi

          echo "All required secrets are present in Key Vault '${KV_NAME}'."

  deploy:
    name: Build image and deploy
    needs: [ci, validate-secrets]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_FROZEN != 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --image ${{ env.IMAGE_NAME }}:latest \
            -f backend/LangTeach.Api/Dockerfile \
            backend

      - name: Configure ACR registry on Container App
        run: |
          az containerapp registry set \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --server ${{ env.ACR_LOGIN_SERVER }} \
            --identity system

      - name: Deploy new revision (hold traffic on old revision)
        id: deploy
        run: |
          # Capture the currently active revision before deploying so we can restore traffic if needed
          OLD_REVISION=$(az containerapp revision list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "[?properties.active && properties.trafficWeight > \`0\`].name | [0]" -o tsv)
          echo "old_revision=${OLD_REVISION}" >> "$GITHUB_OUTPUT"
          echo "Current active revision: ${OLD_REVISION}"

          # Deploy new revision (in Multiple mode this may shift traffic to the new revision)
          NEW_REVISION=$(az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --query "properties.latestRevisionName" -o tsv)
          echo "new_revision=${NEW_REVISION}" >> "$GITHUB_OUTPUT"
          echo "Deployed revision: ${NEW_REVISION}"

          # Immediately pin traffic back to the old revision during health check (0% to new)
          if [ -n "${OLD_REVISION}" ] && [ "${OLD_REVISION}" != "${NEW_REVISION}" ]; then
            az containerapp ingress traffic set \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --revision-weight "${OLD_REVISION}=100"
            echo "Traffic pinned to old revision ${OLD_REVISION} during health check."
          fi

      - name: Wait for revision health and shift traffic
        run: |
          NEW_REVISION="${{ steps.deploy.outputs.new_revision }}"
          OLD_REVISION="${{ steps.deploy.outputs.old_revision }}"
          echo "Polling revision '${NEW_REVISION}' for up to 2 minutes..."

          for i in $(seq 1 24); do
            STATE=$(az containerapp revision show \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --revision "${NEW_REVISION}" \
              --query "properties.provisioningState" -o tsv)

            echo "  Attempt ${i}/24: provisioningState=${STATE}"

            if [ "${STATE}" = "Provisioned" ]; then
              echo "Revision is healthy. Shifting 100% traffic to ${NEW_REVISION}."
              az containerapp ingress traffic set \
                --name ${{ env.CONTAINER_APP_NAME }} \
                --resource-group ${{ env.RESOURCE_GROUP }} \
                --revision-weight "${NEW_REVISION}=100"
              echo "Traffic shift complete."
              exit 0
            elif [ "${STATE}" = "Failed" ] || [ "${STATE}" = "ActivationFailed" ]; then
              echo "ERROR: Revision ${NEW_REVISION} entered Failed/ActivationFailed state."
              if [ -n "${OLD_REVISION}" ]; then
                echo "Old revision ${OLD_REVISION} continues serving 100% of traffic."
                echo "Deactivating failed revision to prevent orphan accumulation..."
                az containerapp revision deactivate \
                  --name ${{ env.CONTAINER_APP_NAME }} \
                  --resource-group ${{ env.RESOURCE_GROUP }} \
                  --revision "${NEW_REVISION}" || true
              else
                echo "No previous active revision (first deploy). Leaving failed revision active for debugging."
              fi
              echo "Investigate via: az containerapp revision show --name ${{ env.CONTAINER_APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --revision ${NEW_REVISION}"
              exit 1
            fi

            sleep 5
          done

          echo "ERROR: Revision ${NEW_REVISION} did not reach Provisioned state within 2 minutes."
          if [ -n "${OLD_REVISION}" ]; then
            echo "Old revision ${OLD_REVISION} continues serving 100% of traffic."
            echo "Deactivating timed-out revision to prevent orphan accumulation..."
            az containerapp revision deactivate \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --revision "${NEW_REVISION}" || true
          else
            echo "No previous active revision (first deploy). Leaving timed-out revision active for debugging."
          fi
          exit 1
