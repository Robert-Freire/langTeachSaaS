name: Merge Sprint to Main

on:
  workflow_dispatch:
    inputs:
      sprint_branch:
        description: 'Sprint branch to merge (e.g., sprint/curriculum-personalization)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (validate only, do not merge)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  validate:
    name: Validate sprint branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sprint_branch }}
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Bicep build
        run: az bicep build --file infra/main.bicep

      - name: Backend build
        run: dotnet build --warnaserror
        working-directory: backend

      - name: Backend tests
        run: dotnet test
        working-directory: backend

      - name: Frontend install
        run: npm ci
        working-directory: frontend

      - name: Frontend build
        run: npm run build
        working-directory: frontend

      - name: Frontend tests
        run: npm test
        working-directory: frontend

  merge:
    name: Merge to main
    needs: validate
    if: ${{ inputs.dry_run == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge sprint branch into main
        run: |
          git fetch origin ${{ inputs.sprint_branch }}
          git merge origin/${{ inputs.sprint_branch }} --no-ff -m "chore: merge ${{ inputs.sprint_branch }} into main"

      - name: Push main
        run: git push origin main
