language: "en-US"

reviews:
  profile: "chill"          # assertive | chill — chill avoids nitpick noise
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  finishing_touches:
    docstrings:
      enabled: false        # Project is C# + TypeScript; Python docstring coverage is not applicable

  tools:
    markdownlint:
      enabled: false        # Was generating repeated low-value comments (missing lang tags on fences, etc.)
    languagetool:
      enabled: false        # Not useful for code comments and config files
    hadolint:
      enabled: false        # No Dockerfiles in review scope
    yamllint:
      enabled: false        # Config files don't need lint reviews

  path_filters:
    - "!**/*.lock"
    - "!**/bin/**"
    - "!**/obj/**"
    - "!**/.next/**"
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!infra/**"          # Bicep infra files — skip unless you want infra review
    - "!.claude/memory/**" # Claude Code internal memory — not source files
    - "!plan/**"           # Plan documents, not source code
    - "!**/*.md"           # Markdown docs don't need code review

  path_instructions:
    - path: "backend/**/*.cs"
      instructions: |
        This is a .NET 8 ASP.NET Core Web API.
        Focus ONLY on: bugs, security issues (injection, auth bypass, data exposure), missing input validation,
        improper async/await, missing cancellation tokens, service lifetime mismatches, race conditions,
        and unhandled exceptions that would crash at runtime.
        Do NOT comment on: naming style, comment formatting, code organization preferences, or minor readability suggestions.
        Follow repository/service pattern conventions already in the codebase.

    - path: "frontend/**/*.{ts,tsx}"
      instructions: |
        This is a React + TypeScript SPA using TailwindCSS and shadcn/ui components.
        Focus ONLY on: bugs, security issues (XSS, unsafe data handling), race conditions, memory leaks,
        unhandled promise rejections, and incorrect state management that would cause runtime errors.
        Do NOT comment on: missing JSDoc, naming preferences, import ordering, or minor style suggestions.

    - path: "e2e/**/*.ts"
      instructions: |
        Playwright end-to-end tests. Focus on: flaky test patterns (hardcoded timeouts instead of waitFor),
        missing assertions that let failures pass silently, and incorrect selectors.
        Do NOT comment on: test structure preferences, naming conventions, or stylistic choices.

chat:
  auto_reply: true
